<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="356" height="260" viewBox="0 0 356 260">
  <foreignObject x="0" y="0" width="356" height="260">
    <html xmlns="http://www.w3.org/1999/xhtml">
      <head>
        <meta charset="utf-8"/>
        <style>:root {
        --bg: #f2fbf3;
        --panel: #ffffff;
        --line: #d5ead9;
        --text: #1b2e21;
        --muted: #5d7a67;
        --accent: #3e9b5f;
        --accent-strong: #2b7d45;
        --danger: #b63b58;
        --ok: #1d7f4f;
        --shadow-soft: 0 14px 28px rgba(20, 56, 30, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 356px;
        min-width: 356px;
        color: var(--text);
        font-family: "Manrope", "Avenir Next", "Trebuchet MS", sans-serif;
        background:
          linear-gradient(160deg, #f6fff7 0%, #f2fbf3 46%, #ebf7ed 100%),
          radial-gradient(circle at 9% 5%, rgba(62, 155, 95, 0.2), transparent 40%),
          radial-gradient(circle at 96% 0%, rgba(43, 125, 69, 0.18), transparent 42%),
          var(--bg);
        overflow: hidden;
      }

      main {
        padding: 10px;
        display: grid;
        gap: 8px;
      }

      .top-card {
        border: 1px solid rgba(213, 234, 217, 0.94);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.84);
        box-shadow: var(--shadow-soft);
        padding: 9px 10px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .brand-logo {
        width: 30px;
        height: 30px;
      }

      .eyebrow {
        margin: 0;
        color: var(--accent-strong);
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 800;
      }

      .hero-title {
        margin: 3px 0 0;
        font-family: "Sora", "Manrope", sans-serif;
        font-size: 15px;
        line-height: 1.2;
      }

      .hero-subtitle {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 10px;
      }

      .live-pill {
        border-radius: 999px;
        border: 1px solid rgba(62, 155, 95, 0.28);
        background: rgba(62, 155, 95, 0.08);
        color: var(--accent-strong);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 5px 8px;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #quizButton {
        border-radius: 999px;
        border: 1px solid rgba(62, 155, 95, 0.35);
        background: linear-gradient(120deg, rgba(62, 155, 95, 0.14), rgba(43, 125, 69, 0.2));
        color: var(--accent-strong);
        padding: 5px 9px;
        font-size: 10px;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        font-weight: 800;
      }

      .panel {
        border: 1px solid rgba(213, 234, 217, 0.86);
        border-radius: 14px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.78);
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .field,
      .field-inline {
        margin: 0;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field .hint {
        margin-top: 1px;
      }

      .span-2 {
        grid-column: 1 / -1;
      }

      .button-row,
      .status,
      .health-panel,
      .panel > details {
        grid-column: 1 / -1;
      }

      .field-inline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      label {
        font-size: 11px;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      select,
      input[type="range"] {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 7px 9px;
        background: #f6fdf7;
        color: var(--text);
        font-size: 12px;
      }

      input[type="range"] {
        padding: 0;
        appearance: none;
        height: 8px;
        border-radius: 999px;
        background: #d7efdd;
      }

      input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 999px;
        border: 2px solid #fff;
        background: linear-gradient(125deg, var(--accent), var(--accent-strong));
        cursor: pointer;
      }

      input[type="range"]::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 999px;
        border: 2px solid #fff;
        background: linear-gradient(125deg, var(--accent), var(--accent-strong));
        cursor: pointer;
      }

      .hint {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
        font-size: 10px;
      }

      .range-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #replacementPercentage {
        flex: 1;
      }

      #replacementPercentageValue {
        min-width: 34px;
        text-align: right;
        color: var(--accent-strong);
        font-size: 11px;
        font-weight: 800;
      }

      .switch-row {
        border: 1px solid var(--line);
        border-radius: 9px;
        background: #f6fdf7;
        padding: 7px 8px;
      }

      input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: var(--accent);
        cursor: pointer;
      }

      .button-row {
        display: flex;
        gap: 7px;
        margin-top: 1px;
      }

      .section-title {
        margin: 0 0 6px;
        color: var(--accent-strong);
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 800;
      }

      button {
        border: 0;
        border-radius: 9px;
        padding: 8px 10px;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.01em;
        cursor: pointer;
        transition: transform 130ms ease, filter 130ms ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      button:hover {
        transform: translateY(-1px);
        filter: saturate(1.05);
      }

      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
        transform: none;
        filter: none;
      }

      #saveButton {
        flex: 1;
        color: #fff;
        background: linear-gradient(125deg, var(--accent), var(--accent-strong));
      }

      #attachButton {
        flex: 1;
        color: var(--accent-strong);
        border: 1px solid rgba(62, 155, 95, 0.3);
        background: rgba(62, 155, 95, 0.08);
      }

      #recheckHealthButton,
      #importVocabularyButton,
      #exportVocabularyButton,
      #clearVocabularyButton {
        flex: 1;
        color: var(--accent-strong);
        border: 1px solid rgba(62, 155, 95, 0.3);
        background: rgba(62, 155, 95, 0.08);
      }

      .health-panel {
        margin-top: 0;
        border: 1px dashed var(--line);
        border-radius: 11px;
        padding: 9px;
        background: rgba(248, 252, 248, 0.84);
      }

      .health-panel summary {
        margin: -9px -9px 8px;
        padding: 8px 9px;
        border-bottom: 1px dashed var(--line);
        color: var(--accent-strong);
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 800;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .health-line {
        margin: 0 0 4px;
        min-height: 14px;
        font-size: 10px;
      }

      .vocabulary-toolbar {
        margin: 6px 0;
      }

      .vocabulary-badges {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        margin: 6px 0;
      }

      .vocabulary-badge {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f6fdf7;
        padding: 5px 6px;
      }

      .vocabulary-badge .label {
        display: block;
        font-size: 9px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.03em;
        font-weight: 700;
      }

      .vocabulary-badge .value {
        display: block;
        margin-top: 2px;
        color: var(--accent-strong);
        font-size: 11px;
        font-weight: 800;
      }

      #vocabularyFilterInput {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 6px 8px;
        background: #f6fdf7;
        color: var(--text);
        font-size: 11px;
      }

      .vocabulary-filter-grid {
        margin-top: 6px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .vocabulary-filter-grid select,
      .vocabulary-filter-grid input[type="date"] {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 6px 8px;
        background: #f6fdf7;
        color: var(--text);
        font-size: 11px;
      }

      #vocabularyClearFiltersButton {
        width: 100%;
        color: var(--accent-strong);
        border: 1px solid rgba(62, 155, 95, 0.3);
        background: rgba(62, 155, 95, 0.08);
      }

      .vocabulary-list {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #eff8f0;
        max-height: 132px;
        overflow: auto;
      }

      #vocabularyTable {
        width: 100%;
        border-collapse: collapse;
        font-size: 11px;
      }

      #vocabularyTable th,
      #vocabularyTable td {
        padding: 6px 8px;
        border-bottom: 1px solid #d5e8d8;
        text-align: left;
        vertical-align: top;
      }

      #vocabularyTable th {
        position: sticky;
        top: 0;
        background: #e6f3e8;
        color: var(--accent-strong);
        font-size: 10px;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .vocabulary-empty {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 10px;
      }

      .status {
        min-height: 16px;
        margin: 4px 0 0;
        font-size: 11px;
        color: var(--muted);
      }

      .status.error {
        color: var(--danger);
      }

      .status.ok {
        color: var(--ok);
      }

      .vocabulary-action-status {
        margin-top: 6px;
        min-height: 14px;
      }

      details {
        margin-top: 0;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: rgba(248, 252, 248, 0.84);
      }

      summary {
        padding: 8px 9px;
        font-size: 11px;
        font-weight: 800;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .debug-content {
        padding: 0 9px 9px;
      }

      .debug-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 0 0 10px;
      }

      #clearLogsButton {
        width: 100%;
        margin-bottom: 6px;
        color: var(--accent-strong);
        border: 1px solid rgba(62, 155, 95, 0.3);
        background: rgba(62, 155, 95, 0.08);
      }

      #logPanel {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 7px;
        height: 108px;
        overflow-y: auto;
        font-family: "Consolas", "JetBrains Mono", monospace;
        font-size: 11px;
        white-space: pre-wrap;
        background: #eff8f0;
      }

      .hidden {
        display: none;
      }

      .icon-inline {
        width: 13px;
        height: 13px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex: 0 0 auto;
      }

      [data-reveal] {
        opacity: 0;
        transform: translateY(10px) scale(0.99);
      }

      [data-reveal].is-visible {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      @media (max-width: 420px) {
        body {
          width: 100%;
          min-width: 300px;
        }

        .panel {
          grid-template-columns: 1fr;
        }

        .span-2 {
          grid-column: auto;
        }
      }</style>
      </head>
      <body><details class="health-panel span-2" open>
          <summary>
            <svg class="icon-inline" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3 3 7l9 4 9-4-9-4Zm-9 9 9 4 9-4M3 17l9 4 9-4" />
            </svg>
            <span>Health</span>
          </summary>
          <p id="contentHealthStatus" class="status health-line" role="status" aria-live="polite">
            Content script: checking active tab...
          </p>
          <p id="translationHealthStatus" class="status health-line" role="status" aria-live="polite">
            Last translation success: none yet.
          </p>
          <div class="button-row">
            <button id="recheckHealthButton" type="button">
              <svg class="icon-inline" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20 12a8 8 0 1 1-2.34-5.66M20 4v6h-6" />
              </svg>
              <span class="btn-text">Recheck</span>
            </button>
          </div>
        </details></body>
    </html>
  </foreignObject>
</svg>
